# ─── Auto-update AI headlines daily ───────────────────────────
# Runs every morning, fetches headlines from 10 RSS feeds,
# overwrites headlines.json AND saves a dated archive file to
# headlines/YYYY-MM-DD.json (kept for 7 days rolling window).
# Commits & pushes — Cloudflare Workers picks up the new deploy.
#
# To enable:
#   1. Push this repo to GitHub
#   2. Ensure CF_API_TOKEN secret is set for wrangler deploy
#   3. This action runs at 7am EST daily
# ──────────────────────────────────────────────────────────────

name: Update AI Headlines

on:
  schedule:
    - cron: '0 12 * * *'   # 7am EST = 12:00 UTC daily
  workflow_dispatch:        # allow manual trigger from GitHub UI

jobs:
  update-headlines:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # needed to push the updated JSON

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install feedparser requests

      - name: Fetch and update headlines
        run: python scripts/fetch-headlines.py --archive

      - name: Commit and push if changed
        run: |
          git config --global user.name  'headline-bot'
          git config --global user.email 'bot@zoviconsulting.com'
          git add headlines.json headlines/
          git diff --staged --quiet || (
            git commit -m "chore: update AI headlines $(date -u '+%Y-%m-%d') [skip ci]" &&
            git push
          )
