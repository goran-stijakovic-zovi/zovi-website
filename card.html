<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Goran Stijakovic — Zovi Consulting</title>
<meta name="description" content="Founder & AI Consultant at Zovi Consulting. AI strategy, custom AI development, and technology leadership for growth-stage companies."/>
<meta name="robots" content="noindex"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}

:root{
  --bg:#070C10;
  --bg-r:#0D1419;
  --bg-e:#131C22;
  --text:#F8FAFC;
  --text-s:#94A3B8;
  --text-m:#475569;
  --accent:#55C6C1;
  --accent-dk:#0A9E99;
  --border:rgba(248,250,252,.08);
  --border-s:rgba(248,250,252,.16);
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:'Inter',sans-serif;
  font-weight:400;
  line-height:1.6;
  -webkit-font-smoothing:antialiased;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}

/* ─── Glow background ───────────────────────────────────────── */
.bg-glow{
  position:fixed;
  inset:0;
  pointer-events:none;
  background:radial-gradient(ellipse 80% 50% at 50% 0%,rgba(85,198,193,.10) 0%,transparent 65%);
  z-index:0;
}

/* ─── Card wrapper ──────────────────────────────────────────── */
.card{
  position:relative;
  z-index:1;
  width:100%;
  max-width:420px;
  padding:2.5rem 1.75rem 2rem;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:0;
}

/* ─── Logo ──────────────────────────────────────────────────── */
.logo{
  font-family:'Syne',sans-serif;
  font-weight:800;
  letter-spacing:-0.02em;
  color:var(--text);
  line-height:1;
  display:inline-flex;
  align-items:baseline;
  gap:0;
  text-decoration:none;
  font-size:1.35rem;
  margin-bottom:2rem;
}
.logo .z{color:var(--accent)}
.logo .i-wrap{position:relative;display:inline-block}
.logo .i-wrap::after{
  content:'';
  position:absolute;
  width:5px;height:5px;
  background:var(--accent);
  border-radius:50%;
  left:50%;
  transform:translateX(-50%);
  top:-3px;
  box-shadow:0 0 8px var(--accent);
  animation:glow-pulse 2.5s ease-in-out infinite;
}

@keyframes glow-pulse{
  0%,100%{opacity:1;box-shadow:0 0 8px var(--accent)}
  50%{opacity:.5;box-shadow:0 0 4px var(--accent)}
}

/* ─── Avatar ────────────────────────────────────────────────── */
.avatar{
  width:88px;height:88px;
  border-radius:50%;
  background:linear-gradient(135deg,var(--accent) 0%,var(--accent-dk) 100%);
  display:flex;align-items:center;justify-content:center;
  font-family:'Syne',sans-serif;
  font-weight:800;
  font-size:1.75rem;
  color:#070C10;
  letter-spacing:-0.02em;
  margin-bottom:1.25rem;
  box-shadow:0 0 28px rgba(85,198,193,.22);
}

/* ─── Identity ──────────────────────────────────────────────── */
.name{
  font-family:'Syne',sans-serif;
  font-weight:800;
  font-size:1.5rem;
  letter-spacing:-0.02em;
  color:var(--text);
  text-align:center;
  line-height:1.1;
  margin-bottom:.35rem;
}
.title{
  font-size:.9rem;
  font-weight:500;
  color:var(--accent);
  text-align:center;
  margin-bottom:.2rem;
}
.company{
  font-size:.85rem;
  font-weight:400;
  color:var(--text-s);
  text-align:center;
  margin-bottom:2rem;
}

/* ─── Divider ───────────────────────────────────────────────── */
.divider{
  width:48px;height:1px;
  background:linear-gradient(90deg,transparent,var(--accent),transparent);
  margin-bottom:2rem;
  opacity:.4;
}

/* ─── Buttons ───────────────────────────────────────────────── */
.actions{
  display:flex;
  flex-direction:column;
  gap:.75rem;
  width:100%;
}

.btn-primary{
  background:var(--accent);
  color:#070C10;
  padding:0 1.25rem;
  height:52px;
  border-radius:8px;
  font-size:.9rem;
  font-weight:700;
  text-decoration:none;
  transition:background 200ms,box-shadow 200ms;
  border:none;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:.6rem;
  width:100%;
  letter-spacing:.01em;
}
.btn-primary:hover{
  background:var(--accent-dk);
  box-shadow:0 0 20px rgba(85,198,193,.35);
}

.btn-outline{
  border:1px solid var(--border-s);
  color:var(--text);
  padding:0 1.25rem;
  height:52px;
  border-radius:8px;
  font-size:.9rem;
  font-weight:500;
  text-decoration:none;
  transition:border-color 200ms,background 200ms;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:.6rem;
  width:100%;
}
.btn-outline:hover{
  border-color:rgba(85,198,193,.4);
  background:rgba(85,198,193,.04);
}

.btn-icon{
  width:18px;height:18px;
  flex-shrink:0;
  opacity:.85;
}

/* ─── QR section ───────────────────────────────────────────── */
.qr-section{
  margin-top:2rem;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:.75rem;
  width:100%;
}
.qr-label{
  font-size:.7rem;
  font-weight:600;
  letter-spacing:.1em;
  text-transform:uppercase;
  color:var(--text-m);
}
.qr-wrap{
  padding:14px;
  background:var(--bg-e);
  border-radius:12px;
  border:1px solid var(--border);
  display:inline-flex;
}
.qr-wrap img{
  display:block;
  border-radius:4px;
}
.qr-url{
  font-size:.75rem;
  color:var(--text-s);
  letter-spacing:.02em;
}

/* ─── Footer ────────────────────────────────────────────────── */
.footer{
  margin-top:2rem;
  font-size:.72rem;
  color:var(--text-m);
  letter-spacing:.04em;
  text-align:center;
}
</style>
</head>
