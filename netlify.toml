# ─── Netlify Configuration ────────────────────────────────────
# Docs: https://docs.netlify.com/configure-builds/file-based-configuration/

[build]
  publish = "."          # static files are at repo root
  # No build command needed — pure static HTML

# ─── Security headers ─────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# ─── Cache headlines.json — short TTL so updates appear fast ──
[[headers]]
  for = "/headlines.json"
  [headers.values]
    Cache-Control = "public, max-age=300, stale-while-revalidate=3600"

# ─── Cache static assets ──────────────────────────────────────
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# ─── Redirects ────────────────────────────────────────────────
# www → apex
[[redirects]]
  from   = "https://www.zoviconsulting.com/*"
  to     = "https://zoviconsulting.com/:splat"
  status = 301
  force  = true

# 404 fallback
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
